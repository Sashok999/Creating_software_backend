<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск | Брон.ик</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0b1e33;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* NAVBAR — как в main.html */
        .navbar {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #eef2f6;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1a4cff 0%, #7b3fe4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .logo span {
            font-weight: 600;
            background: none;
            -webkit-text-fill-color: #1e293b;
            color: #1e293b;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #334155;
            transition: color 0.2s;
            font-size: 15px;
        }

        .nav-links a:hover { color: #1a4cff; }

        .btn-outline {
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: 600;
            color: #1e293b;
            background: white;
            transition: 0.2s;
        }

        .btn-outline:hover {
            border-color: #1a4cff;
            color: #1a4cff;
            background: #f5f9ff;
        }

        /* HERO */
        .hero {
            background: #0b1e33;
            padding: 48px 24px;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
            margin-bottom: 8px;
        }

        .hero p {
            color: rgba(255,255,255,0.45);
            font-size: 15px;
            margin-bottom: 32px;
        }

        /* SEARCH CARD — как в main.html */
        .search-card {
            background: white;
            border-radius: 32px;
            padding: 28px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            max-width: 900px;
            margin: 0 auto;
        }

        .search-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .search-field {
            flex: 1 1 180px;
        }

        .search-field label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #64748b;
            display: block;
            margin-bottom: 6px;
        }

        .search-field input,
        .search-field select {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            background: #f1f4f9;
            font-family: 'Inter', sans-serif;
            transition: 0.15s;
        }

        .search-field input:focus,
        .search-field select:focus {
            outline: none;
            border-color: #1a4cff;
            background: white;
            box-shadow: 0 0 0 4px #1a4cff20;
        }

        .search-btn {
            background: #1a4cff;
            border: none;
            border-radius: 40px;
            padding: 13px 32px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
            white-space: nowrap;
            box-shadow: 0 4px 12px #1a4cff70;
        }

        .search-btn:hover {
            background: #0f3ad0;
            transform: scale(1.02);
        }

        /* CONTENT */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .results-header h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        #results-count {
            color: #64748b;
            font-size: 14px;
        }

        /* GRID */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 30px -8px rgba(0,0,0,0.08);
            border: 1px solid #edf2f7;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.3s ease both;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 40px -12px #1a4cff40;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-img {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #e8edf5 0%, #d0d9e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .card-body { padding: 20px; }

        .card-type {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #1a4cff;
            background: #ecf2ff;
            padding: 3px 10px;
            border-radius: 40px;
            margin-bottom: 10px;
        }

        .card-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #0b1e33;
        }

        .card-address {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-address i { color: #1a4cff; font-size: 11px; }

        .card-desc {
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid #eef2f6;
        }

        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: #1a4cff;
        }

        .card-price small {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
        }

        .btn-book {
            background: transparent;
            border: 1.5px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 13px;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-book:hover {
            background: #1a4cff;
            border-color: #1a4cff;
            color: white;
        }

        /* STATES */
        .state-box {
            text-align: center;
            padding: 64px 24px;
            color: #94a3b8;
        }

        .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .state-box p { font-size: 15px; }

        .loading-dots span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #1a4cff;
            margin: 0 3px;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1); opacity: 1; }
        }

        /* FOOTER */
        footer {
            padding: 24px 0;
            border-top: 1px solid #dee6ed;
            color: #475569;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        footer a {
            text-decoration: none;
            color: #475569;
            transition: color 0.2s;
        }

        footer a:hover { color: #1a4cff; }

        @media (max-width: 700px) {
            .search-flex { flex-direction: column; }
            .search-btn { justify-content: center; }
            .hero h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">Брон<span>.ик</span></a>
        <div class="nav-links">
            <a href="/">На главную</a>
            <a href="/login" class="btn-outline"><i class="fas fa-sign-in-alt" style="margin-right:6px"></i>Войти</a>
            <a href="/register" class="btn-outline"><i class="fas fa-user-plus" style="margin-right:6px"></i>Регистрация</a>
        </div>
    </div>
</nav>

<div class="hero">
    <h1>Найдите своё место</h1>
    <p>Комнаты, рабочие места и автомобили — всё в одном месте</p>
    <div class="search-card">
        <div class="search-flex">
            <div class="search-field">
                <label><i class="fas fa-map-pin" style="margin-right:4px"></i> Город или адрес</label>
                <input type="text" id="location" placeholder="Москва, Сочи...">
            </div>
            <div class="search-field">
                <label><i class="fas fa-th-large" style="margin-right:4px"></i> Тип</label>
                <select id="type">
                    <option value="">Любой тип</option>
                    <option value="room">Комната</option>
                    <option value="desk">Рабочее место</option>
                    <option value="car">Автомобиль</option>
                </select>
            </div>
            <div class="search-field">
                <label><i class="far fa-calendar" style="margin-right:4px"></i> Заезд</label>
                <input type="datetime-local" id="date_from">
            </div>
            <div class="search-field">
                <label><i class="far fa-calendar" style="margin-right:4px"></i> Выезд</label>
                <input type="datetime-local" id="date_to">
            </div>
            <button class="search-btn" onclick="doSearch()">
                <i class="fas fa-search"></i> Найти
            </button>
        </div>
    </div>
</div>

<div class="content">
    <div class="results-header">
        <h2>🔥 Результаты поиска</h2>
        <span id="results-count"></span>
    </div>

    <div id="results-container">
        <div class="state-box">
            <div class="icon">🔍</div>
            <p>Введите параметры и нажмите «Найти»</p>
        </div>
    </div>
</div>

<footer class="container">
    <div>© 2025 Брон.ик — бронирование недвижимости</div>
    <div style="display:flex; gap:28px;">
        <a href="/terms">Правила</a>
        <a href="/privacy">Конфиденциальность</a>
        <a href="/support">Поддержка</a>
    </div>
</footer>

<script>
    const TYPE_LABELS = { room: 'Комната', desk: 'Рабочее место', car: 'Автомобиль' };
    const TYPE_ICONS  = { room: '🏠', desk: '💼', car: '🚗' };

    async function doSearch() {
        const location  = document.getElementById('location').value.trim();
        const type      = document.getElementById('type').value;
        const date_from = document.getElementById('date_from').value;
        const date_to   = document.getElementById('date_to').value;

        const body = {};
        if (location)  body.location  = location;
        if (type)      body.type      = type;
        if (date_from) body.date_from = date_from;
        if (date_to)   body.date_to   = date_to;

        showLoading();

        try {
            const res  = await fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            renderResults(data.results || []);
        } catch (e) {
            showError();
        }
    }

    function renderResults(items) {
        const count = document.getElementById('results-count');
        const container = document.getElementById('results-container');

        if (!items.length) {
            count.textContent = '';
            container.innerHTML = `
                <div class="state-box">
                    <div class="icon">😔</div>
                    <p>Ничего не найдено. Попробуйте изменить фильтры.</p>
                </div>`;
            return;
        }

        count.textContent = `Найдено: ${items.length}`;
        container.innerHTML = `<div class="results-grid">${items.map(cardHTML).join('')}</div>`;
    }

    function cardHTML(r) {
        const typeLabel = TYPE_LABELS[r.type] || r.type || '—';
        const typeIcon  = TYPE_ICONS[r.type]  || '🏢';
        const price     = r.base_price ? `${Number(r.base_price).toLocaleString('ru-RU')} ₽ <small>/ сутки</small>` : '—';
        const address   = r.address  || r.location || 'Адрес не указан';
        const desc      = r.description || '';

        return `
        <div class="card">
            <div class="card-img">${typeIcon}</div>
            <div class="card-body">
                <span class="card-type">${typeLabel}</span>
                <div class="card-name">${r.name || 'Без названия'}</div>
                <div class="card-address"><i class="fas fa-location-dot"></i> ${address}</div>
                ${desc ? `<div class="card-desc">${desc}</div>` : ''}
                <div class="card-footer">
                    <div class="card-price">${price}</div>
                    <button class="btn-book" onclick="goToCard(${r.id})">Подробнее</button>
                </div>
            </div>
        </div>`;
    }

    function goToCard(id) {
        window.location.href = `/resource/${id}`;
    }

    function showLoading() {
        document.getElementById('results-count').textContent = '';
        document.getElementById('results-container').innerHTML = `
            <div class="state-box">
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <p style="margin-top:1rem">Ищем...</p>
            </div>`;
    }

    function showError() {
        document.getElementById('results-count').textContent = '';
        document.getElementById('results-container').innerHTML = `
            <div class="state-box">
                <div class="icon">⚠️</div>
                <p>Ошибка при запросе. Проверьте соединение.</p>
            </div>`;
    }

    // Поиск по Enter
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });
</script>

</body>
</html>
